<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Michael Gentil | Links</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    .profile-img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 3px solid #38bdf8;
    }

    h1 {
      margin: 10px 0;
      font-size: 24px;
    }

    p {
      font-size: 14px;
      color: #cbd5f5;
      margin-bottom: 25px;
    }

    .link {
      display: block;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .link:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="container">
    <img perfil="/avatar.png" alt="Foto de perfil" class="profile-img">
    
    <h1>Michael Gentil</h1>
    <p>Estudante de Análise e Desenvolvimento de Sistemas 💻</p>

    <a href="#" class="link">📁 Portfólio</a>
    <a href="#" class="link">💼 LinkedIn</a>
    <a href="#" class="link">🐙 GitHub</a>
    <a href="#" class="link">📧 Contato</a>
    <a href="#" class="link">📚 Projetos</a>

    <footer>
      © 2026 Michael Gentil
    </footer>
  </div>

</body>
</html>
